version: "3.8"

services:

  blue:
    build: ./blue
    container_name: blue-app

  green:
    build: ./green
    container_name: green-app

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - blue
      - green