services:

  blue:
    build: ./blue
    container_name: blue-app
    ports:
      - "8081:80"  

  green:
    build: ./green
    container_name: green-app
    ports:
      - "8082:80"   

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - blue
      - green