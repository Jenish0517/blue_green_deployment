version: "3.8"

services:
  blue:
    build: ./blue
    container_name: blue-app
    environment:
      - SERVER_PORT=80
    networks:
      - blue-green-net

  green:
    build: ./green
    container_name: green-app
    environment:
      - SERVER_PORT=80
    networks:
      - blue-green-net

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - blue-green-net
    depends_on:
      - blue
      - green

  jenkins:
    build: ./jenkins
    container_name: jenkins
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jenkins_home:/var/jenkins_home
    networks:
      - blue-green-net

networks:
  blue-green-net:
    driver: bridge

volumes:
  jenkins_home:
